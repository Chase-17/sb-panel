app = "sb-panel"
primary_region = "ams"

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = "sb_data"
  destination = "/data"

[env]
  DATABASE_URL = "sqlite+aiosqlite:////data/sb_panel.db"
